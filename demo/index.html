            <button type="button" data-value="female">Female</button>
          </div>
          <div class="seg" id="theme-seg" aria-label="Theme">

      <section class="bodies">
        <figure class="body-card">
          <div id="map-front" class="map"></div>
          <figcaption>Front</figcaption>
        </figure>
        <figure class="body-card">
