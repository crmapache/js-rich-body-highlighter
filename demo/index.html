<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>js-rich-body-highlighter</title>
    <meta
      name="description"
      content="Interactive muscle map: highlights muscle groups with mix-blend-mode over a detailed body illustration. Front and back, male and female."
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>

    <header class="topbar">
      <div class="brand">
        <span class="dot"></span>
        js-rich-body-highlighter
      </div>
      <div class="switches">
        <div class="seg" id="gender-seg" aria-label="Gender">
          <button type="button" data-value="male">Male</button>
          <button type="button" data-value="female" class="active">Female</button>
        </div>
        <div class="seg" id="theme-seg" aria-label="Theme">
          <button type="button" data-value="light">Light</button>
          <button type="button" data-value="dark" class="active">Dark</button>
        </div>
      </div>
    </header>

    <main class="stage">
      <div class="presets-wrap">
        <span class="presets-label">Пресеты тренировок</span>
        <div id="presets" class="presets"></div>
      </div>

      <section class="bodies">
        <figure class="body-card">
          <div id="map-front" class="map"></div>
          <figcaption>Спереди</figcaption>
        </figure>
        <figure class="body-card">
          <div id="map-back" class="map"></div>
          <figcaption>Сзади</figcaption>
        </figure>
      </section>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
